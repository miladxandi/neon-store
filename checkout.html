<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop — Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/checkout.css">
</head>
<body id="main">

<!-- ========== TEMPLATES (Hidden) ========== -->
<span id="product-image" class="hidden content product-image d-none"></span>

<div class="ui card d-none" id="card">
    <div class="card-image-wrapper">
        <div class="ui slide masked reveal image">
        </div>
        <div class="card-badge">NEW</div>
    </div>
    <div class="content">
        <a class="header product-title"></a>
        <div class="meta">
            <span class="date product-description"></span>
        </div>
    </div>
    <div class="extra content card-actions">
        <span class="product-price"></span>
        <button class="ui button add-to-cart-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            Add to basket
        </button>
    </div>
</div>

<div class="item d-none" id="item">
    <div class="content">
        <div class="header">Product One</div>
        <div class="description">Qty: 1</div>
        <div class="extra">€20</div>
    </div>
</div>

<div class="item d-none" id="basket-item">
    <div class="image">
        <img class="item-image" src="">
    </div>
    <div class="content">
        <a class="header"></a>
        <div class="meta">
            <span>Description</span>
        </div>
        <div class="description">
            <p></p>
        </div>
        <div class="extra">


        </div>
    </div>
</div>

<!-- ========== NAVBAR ========== -->
<nav class="top-navbar">
    <div class="navbar-inner">
        <div class="navbar-brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            <span>MyShop</span>
        </div>

        <div class="navbar-links">
            <a class="nav-link active" href="/">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Home
            </a>
            <!--            <a class="nav-link" href="#">-->
            <!--                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"-->
            <!--                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">-->
            <!--                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>-->
            <!--                    <line x1="8" y1="21" x2="16" y2="21"/>-->
            <!--                    <line x1="12" y1="17" x2="12" y2="21"/>-->
            <!--                </svg>-->
            <!--                Products-->
            <!--            </a>-->
        </div>

        <div class="navbar-actions">
            <div class="ui dropdown cart-wrapper">
                <button class="cart-btn" id="cart-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 14a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"/>
                        <path d="M5.001 8h13.999a2 2 0 0 1 1.977 2.304l-1.255 7.152a3 3 0 0 1 -2.966 2.544h-9.512a3 3 0 0 1 -2.965 -2.544l-1.255 -7.152a2 2 0 0 1 1.977 -2.304"/>
                        <path d="M17 10l-2 -6"/>
                        <path d="M7 10l2 -6"/>
                    </svg>
                    <span class="cart-badge total-quantity">0</span>
                </button>

                <!-- Dropdown Cart -->
                <div class="cart-dropdown menu" id="cart-dropdown">
                    <div class="cart-dropdown-header">
                        <h3>Shopping Cart</h3>
                        <span class="cart-count"><span class="total-quantity">0</span> items</span>
                    </div>
                    <div class="cart-dropdown-body">
                        <div class="ui divided items" id="cart">
                            <!-- Cart items go here -->
                        </div>
                        <div class="cart-empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                 stroke-linejoin="round">
                                <circle cx="8" cy="21" r="1"/>
                                <circle cx="19" cy="21" r="1"/>
                                <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
                            </svg>
                            <p>Your cart is empty</p>
                        </div>
                    </div>
                    <div class="cart-dropdown-footer">
                        <a href="checkout.html">
                            <button class="checkout-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                     stroke-linejoin="round">
                                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                                    <line x1="1" y1="10" x2="23" y2="10"/>
                                </svg>
                                Checkout
                            </button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="hero-content">
        <div class="ui items" id="items">
        </div>
    </div>
</section>
<!-- ========== FOOTER ========== -->
<footer class="site-footer">
    <div class="ui container">
        <div class="footer-content">
            <div class="footer-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>
                <span>MyShop</span>
            </div>
            <p class="footer-text">© 2026 MyShop. All rights reserved. Made with ❤️</p>
        </div>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.js"></script>
<script type="module" src="scripts/checkout.js"></script>
<script type="module" src="scripts/useBasket.js"></script>
</body>
</html>
